<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memphis — Brodie Trips</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--cream:#f9f7f3;--ink:#1a1a18;--muted:#7a7a72;--border:#e0ddd8;--accent:#8b3a2a;}
    body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--ink);font-weight:300;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:1.4rem 3rem;background:rgba(249,247,243,0.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);}
    .nav-brand{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;text-decoration:none;color:var(--ink);}
    .nav-links{display:flex;gap:2.5rem;list-style:none;}
    .nav-links a{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--muted);transition:color .2s;}
    .nav-links a:hover{color:var(--ink);}
    .hero{padding:120px 2rem 3rem;max-width:900px;margin:0 auto;}
    .back-link{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;color:var(--muted);display:inline-block;margin-bottom:2rem;transition:color .2s;}
    .back-link:hover{color:var(--ink);}
    .trip-title{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,8vw,5.5rem);font-weight:300;line-height:1;margin-bottom:.75rem;}
    .trip-meta{font-size:.8rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem;}
    .hero-img{width:100%;height:420px;object-fit:cover;margin-bottom:2rem;}
    .content{max-width:900px;margin:0 auto;padding:0 2rem 5rem;}
    .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:.75rem;margin:1.5rem 0;}
    .photo-grid img{width:100%;height:200px;object-fit:cover;display:block;cursor:pointer;transition:opacity .2s;}
    .photo-grid img:hover{opacity:.92;}
    .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;align-items:center;justify-content:center;}
    .lightbox.open{display:flex;}
    .lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;}
    .lightbox-close{position:absolute;top:1.5rem;right:2rem;color:#fff;font-size:2rem;cursor:pointer;opacity:.7;transition:opacity .2s;}
    .lightbox-close:hover{opacity:1;}
    .lightbox-prev,.lightbox-next{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:2rem;cursor:pointer;opacity:.6;transition:opacity .2s;background:none;border:none;padding:.5rem 1rem;}
    .lightbox-prev:hover,.lightbox-next:hover{opacity:1;}
    .lightbox-prev{left:1rem;}.lightbox-next{right:1rem;}
    footer{text-align:center;padding:2.5rem;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-top:1px solid var(--border);}
    @media(max-width:600px){nav{padding:1rem 1.5rem;}.hero,.content{padding-left:1.5rem;padding-right:1.5rem;}.photo-grid{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>
<nav>
  <a class="nav-brand" href="../index.html">Brodie Trips</a>
  <ul class="nav-links">
    <li><a href="../index.html">Home</a></li>
    <li><a href="../index.html#trips">Trips</a></li>
    <li><a href="../cocktails/index.html">Cocktails</a></li>
  </ul>
</nav>

<div class="hero">
  <a class="back-link" href="../index.html">← All Trips</a>
  <h1 class="trip-title">Memphis</h1>
  <div class="trip-meta">Tennessee &nbsp;·&nbsp; 2026</div>
</div>

<img class="hero-img" src="https://res.cloudinary.com/dkybcebbo/image/upload/IAMaMAN.jpg" alt="Memphis">

<div class="content">
  <div class="photo-grid">
    <img src="https://res.cloudinary.com/dkybcebbo/image/upload/IMG_1034.jpg" alt="">
    <img src="https://res.cloudinary.com/dkybcebbo/image/upload/IMG_1042.jpg" alt="">
    <img src="https://res.cloudinary.com/dkybcebbo/image/upload/IMG_1045.jpg" alt="">
    <img src="https://res.cloudinary.com/dkybcebbo/image/upload/IMG_1048.jpg" alt="">
    <img src="https://res.cloudinary.com/dkybcebbo/image/upload/IMG_1056.jpg" alt="">
    <img src="https://res.cloudinary.com/dkybcebbo/image/upload/IMG_4946.jpg" alt="">
    <img src="https://res.cloudinary.com/dkybcebbo/image/upload/IMG_4954.jpg" alt="">
    <img src="https://res.cloudinary.com/dkybcebbo/image/upload/IMG_4956.jpg" alt="">
    <img src="https://res.cloudinary.com/dkybcebbo/image/upload/IMG_4969.jpg" alt="">
    <img src="https://res.cloudinary.com/dkybcebbo/image/upload/IMG_4972.jpg" alt="">
  </div>
</div>

<footer>© The Brodies &nbsp;·&nbsp; Adventures around the world</footer>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lb-close">&times;</span>
  <button class="lightbox-prev" id="lb-prev">&#8592;</button>
  <img id="lb-img" src="" alt="">
  <button class="lightbox-next" id="lb-next">&#8594;</button>
</div>
<script>
  const allImgs = Array.from(document.querySelectorAll('.photo-grid img'));
  const lb = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  let current = 0;
  function openLightbox(idx){current=idx;lbImg.src=allImgs[idx].src;lb.classList.add('open');document.body.style.overflow='hidden';}
  function closeLightbox(){lb.classList.remove('open');document.body.style.overflow='';}
  function showNext(){current=(current+1)%allImgs.length;lbImg.src=allImgs[current].src;}
  function showPrev(){current=(current-1+allImgs.length)%allImgs.length;lbImg.src=allImgs[current].src;}
  allImgs.forEach((img,idx)=>img.addEventListener('click',()=>openLightbox(idx)));
  document.getElementById('lb-close').addEventListener('click',closeLightbox);
  document.getElementById('lb-next').addEventListener('click',showNext);
  document.getElementById('lb-prev').addEventListener('click',showPrev);
  lb.addEventListener('click',e=>{if(e.target===lb)closeLightbox();});
  document.addEventListener('keydown',e=>{if(!lb.classList.contains('open'))return;if(e.key==='Escape')closeLightbox();if(e.key==='ArrowRight')showNext();if(e.key==='ArrowLeft')showPrev();});
</script>
</body>
</html>
